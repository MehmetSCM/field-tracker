<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Field Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--surface:#1E1E1E;--surface2:#2A2A2A;--border:#383838;
  --accent:#F59E0B;--ok:#22C55E;--danger:#EF4444;
  --text:#F3F3F3;--muted:#777;--r:14px;--h:56px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}
/* screens */
.pg{display:none;flex-direction:column;height:100svh;max-width:480px;margin:0 auto}
.pg.on{display:flex}
/* setup */
.setup-scroll{flex:1;overflow-y:auto;padding:24px 16px 40px}
h1{font-size:24px;font-weight:800;margin-bottom:4px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.inp{width:100%;height:var(--h);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:20px;font-weight:600;padding:0 16px;appearance:none;-webkit-appearance:none;margin-bottom:18px}
.inp:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:10px;margin-bottom:18px}
.tog{flex:1;height:var(--h);border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:16px;font-weight:700;cursor:pointer}
.tog.on{border-color:var(--accent);background:rgba(245,158,11,.12);color:var(--accent)}
.btn{width:100%;height:var(--h);border:none;border-radius:var(--r);font-size:17px;font-weight:800;cursor:pointer;letter-spacing:.01em}
.btn-accent{background:var(--accent);color:#111}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1.5px solid var(--border)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger)}
/* tracker top */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.proj{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.meta{font-size:12px;color:var(--muted);margin-top:2px}
/* dashboard */
.dash{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dc{padding:12px 4px;text-align:center}
.dc+.dc{border-left:1px solid var(--border)}
.dv{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.dv.a{color:var(--accent)}
.dl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:3px}
/* entry */
.entry{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.erow{display:flex;gap:10px;margin-bottom:10px}
.ef{flex:1}
.el{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ei{width:100%;height:52px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:22px;font-weight:700;padding:0 12px;text-align:center;appearance:none;-webkit-appearance:none}
.ei:focus{outline:none;border-color:var(--accent)}
.ei.dim{color:var(--muted)}
.savebtn{width:100%;height:52px;background:var(--accent);border:none;border-radius:12px;color:#111;font-size:17px;font-weight:800;cursor:pointer}
/* log */
.logarea{flex:1;overflow-y:auto;padding:12px 16px}
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px}
.li{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.li-l .st{font-size:22px;font-weight:800}
.li-l .w{font-size:13px;color:var(--muted);margin-top:2px}
.li-r{text-align:right}
.li-r .ca{font-size:20px;font-weight:700;color:var(--accent)}
.li-r .cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.del{background:none;border:none;color:var(--border);font-size:16px;cursor:pointer;padding:4px 6px;margin-left:8px}
/* bottom */
.bot{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.endbtn{flex:1;height:50px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-size:15px;font-weight:700;cursor:pointer}
.synbtn{width:50px;height:50px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.synbtn.ok{border-color:var(--ok);color:var(--ok)}
.synbtn.err{border-color:var(--danger);color:var(--danger)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 44px;width:100%;max-width:480px}
.mtitle{font-size:18px;font-weight:800;margin-bottom:6px}
.msub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.mstat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px}
.mstat:last-of-type{border:none;margin-bottom:16px}
.mv{font-weight:700;color:var(--accent)}
.mbtns{display:flex;flex-direction:column;gap:10px}
/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:#333;color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:all .2s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SETUP -->
<div class="pg on" id="pg-setup">
  <div class="setup-scroll">
    <h1>New Session</h1>
    <div class="sub">Configure today's milling entry</div>

    <label class="lbl">Project</label>
    <input class="inp" id="s-proj" type="text" value="26754-0000">

    <label class="lbl">Segment / LKI</label>
    <input class="inp" id="s-seg" type="text" placeholder="e.g. Segment 2 NB" style="font-size:16px">

    <label class="lbl">Direction</label>
    <div class="row">
      <button class="tog on" id="bnb" onclick="setDir('NB')">NB ↑</button>
      <button class="tog" id="bsb" onclick="setDir('SB')">SB ↓</button>
    </div>

    <label class="lbl">Start Station</label>
    <input class="inp" id="s-st" type="number" inputmode="numeric" placeholder="e.g. 43170">

    <label class="lbl">Date</label>
    <input class="inp" id="s-dt" type="text" placeholder="2 Jul 26" style="font-size:16px">

    <button class="btn btn-accent" id="start-btn" onclick="startSession()">Start Milling Session →</button>
  </div>
</div>

<!-- TRACKER -->
<div class="pg" id="pg-track">
  <div class="topbar">
    <div class="proj" id="t-proj">—</div>
    <div class="meta" id="t-meta">—</div>
  </div>
  <div class="dash">
    <div class="dc"><div class="dv" id="d-s">—</div><div class="dl">Start</div></div>
    <div class="dc"><div class="dv a" id="d-c">—</div><div class="dl">Current</div></div>
    <div class="dc"><div class="dv" id="d-w">—</div><div class="dl">Avg W (m)</div></div>
    <div class="dc"><div class="dv a" id="d-a">—</div><div class="dl">Area m²</div></div>
  </div>
  <div class="entry">
    <div class="erow">
      <div class="ef"><span class="el">Station</span><input class="ei" id="e-st" type="number" inputmode="numeric" placeholder="—"></div>
      <div class="ef"><span class="el">Width (m)</span><input class="ei" id="e-w" type="number" inputmode="decimal" step="0.01" placeholder="—"></div>
    </div>
    <button class="savebtn" onclick="addEntry()">Save Reading</button>
  </div>
  <div class="logarea" id="logarea"><div class="empty" id="empty">Enter the first reading above</div></div>
  <div class="bot">
    <button class="endbtn" onclick="openEndModal()">End Session</button>
    <button class="synbtn" id="synbtn" onclick="sync()">☁</button>
  </div>
</div>

<!-- END MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="mtitle" id="m-title">End Session?</div>
    <div class="msub" id="m-sub">Saves to Google Sheets then resets for a new session.</div>
    <div class="mstat"><span>Readings</span><span class="mv" id="m-n">0</span></div>
    <div class="mstat"><span>Start → End</span><span class="mv" id="m-rng">—</span></div>
    <div class="mstat"><span>Total Length</span><span class="mv" id="m-len">—</span></div>
    <div class="mstat"><span>Avg Width</span><span class="mv" id="m-avw">—</span></div>
    <div class="mstat"><span>Total Area</span><span class="mv" id="m-ar">—</span></div>
    <div class="mbtns">
      <button class="btn btn-accent" id="m-ok" onclick="endSession()">Save & End Session</button>
      <button class="btn btn-ghost" onclick="closeModal()">Keep Working</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz72wxCp12yzTbzkJzhpYVAwtaTziUKwoyiTIGerg0OQ15kX5JAm5oU7A0bLu7CrENiaQ/exec';

// ── STATE ─────────────────────────────────────────────────────────────────
let dir = 'NB';
let sess = null;
let rows = [];

function persist() {
  localStorage.setItem('ft3_sess', JSON.stringify(sess));
  localStorage.setItem('ft3_rows', JSON.stringify(rows));
}

function restore() {
  try {
    const s = localStorage.getItem('ft3_sess');
    const r = localStorage.getItem('ft3_rows');
    if (s) sess = JSON.parse(s);
    if (r) rows = JSON.parse(r);
  } catch(e) { sess = null; rows = []; }
}

// ── DIRECTION ─────────────────────────────────────────────────────────────
function setDir(d) {
  dir = d;
  document.getElementById('bnb').classList.toggle('on', d === 'NB');
  document.getElementById('bsb').classList.toggle('on', d === 'SB');
}

// ── SETUP → START ─────────────────────────────────────────────────────────
function startSession() {
  const proj = document.getElementById('s-proj').value.trim() || '26754-0000';
  const seg  = document.getElementById('s-seg').value.trim();
  const st   = parseFloat(document.getElementById('s-st').value);
  const dt   = document.getElementById('s-dt').value.trim();

  if (isNaN(st)) { showToast('Enter a start station'); return; }
  if (!dt)       { showToast('Enter a date'); return; }

  const tab = 'FT-' + dt.replace(/\s+/g,'');
  sess = { proj, seg, dir, startSt: st, date: dt, tab };
  rows = [];
  persist();
  goTracker();
}

function goTracker() {
  document.getElementById('pg-setup').classList.remove('on');
  document.getElementById('pg-track').classList.add('on');
  // Info bar
  document.getElementById('t-proj').textContent =
    sess.proj + (sess.seg ? ' · ' + sess.seg : '');
  document.getElementById('t-meta').textContent =
    sess.date + ' · ' + sess.dir + ' · Milling';
  // Dashboard
  document.getElementById('d-s').textContent = sess.startSt;
  refreshDash();
  renderLog();
  // Pre-fill first station
  document.getElementById('e-st').value = rows.length === 0
    ? sess.startSt
    : nextSt();
}

// ── NEXT STATION SUGGESTION ───────────────────────────────────────────────
function nextSt() {
  if (!sess || rows.length === 0) return '';
  const last = rows[rows.length - 1].station;
  return last + (sess.dir === 'NB' ? 50 : -50);
}

// ── ADD ENTRY ─────────────────────────────────────────────────────────────
function addEntry() {
  const st = parseFloat(document.getElementById('e-st').value);
  const w  = parseFloat(document.getElementById('e-w').value);
  if (isNaN(st)) { showToast('Enter a station'); return; }
  if (isNaN(w) || w <= 0) { showToast('Enter a valid width'); return; }

  const prev = rows.length > 0 ? rows[rows.length - 1] : null;
  let len = 0, seg = 0, cum = 0;

  if (prev) {
    const raw = Math.abs(st - prev.station);
    const same = raw < 0.01;
    const lki  = raw > 5000;
    len = (same || lki) ? 0 : raw;
    seg = len > 0 ? ((prev.width + w) / 2) * len : 0;
    cum = prev.cum + seg;
    if (lki) showToast('LKI change detected — length set to 0');
  }

  rows.push({ station: st, width: w, len, seg, cum, ts: new Date().toISOString() });
  persist();

  document.getElementById('e-w').value = '';
  document.getElementById('e-st').value = st + (sess.dir === 'NB' ? 50 : -50);

  refreshDash();
  renderLog();
  document.getElementById('e-w').focus();
}

// ── DELETE ────────────────────────────────────────────────────────────────
function del(i) {
  rows.splice(i, 1);
  // Recalculate cumulative from scratch
  for (let j = 0; j < rows.length; j++) {
    if (j === 0) { rows[j].len = 0; rows[j].seg = 0; rows[j].cum = 0; }
    else {
      const prev = rows[j-1];
      const raw = Math.abs(rows[j].station - prev.station);
      const lki = raw > 5000;
      rows[j].len = lki ? 0 : raw;
      rows[j].seg = rows[j].len > 0 ? ((prev.width + rows[j].width)/2) * rows[j].len : 0;
      rows[j].cum = prev.cum + rows[j].seg;
    }
  }
  persist();
  refreshDash();
  renderLog();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function refreshDash() {
  const n = rows.length;
  if (n === 0) {
    document.getElementById('d-c').textContent = '—';
    document.getElementById('d-w').textContent = '—';
    document.getElementById('d-a').textContent = '—';
    return;
  }
  const last = rows[n-1];
  document.getElementById('d-c').textContent = last.station;
  document.getElementById('d-a').textContent = last.cum.toFixed(0);
  const totLen = rows.reduce((s,r) => s+r.len, 0);
  const avgW = totLen > 0 ? last.cum / totLen : 0;
  document.getElementById('d-w').textContent = avgW > 0 ? avgW.toFixed(2) : '—';
}

// ── LOG ───────────────────────────────────────────────────────────────────
function renderLog() {
  const area = document.getElementById('logarea');
  const empty = document.getElementById('empty');
  // Remove old items
  area.querySelectorAll('.li').forEach(e => e.remove());
  if (rows.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const frag = document.createDocumentFragment();
  for (let i = rows.length - 1; i >= 0; i--) {
    const r = rows[i];
    const d = document.createElement('div');
    d.className = 'li';
    d.innerHTML = `
      <div class="li-l">
        <div class="st">ST ${r.station}</div>
        <div class="w">${r.width.toFixed(2)} m${r.seg > 0 ? ' · +' + r.seg.toFixed(1) + ' m²' : ''}</div>
      </div>
      <div class="li-r">
        <div class="ca">${r.cum.toFixed(1)}</div>
        <div class="cl">m² total</div>
      </div>
      <button class="del" onclick="del(${i})">✕</button>`;
    frag.appendChild(d);
  }
  area.insertBefore(frag, area.firstChild);
}

// ── END SESSION MODAL ─────────────────────────────────────────────────────
function openEndModal() {
  if (rows.length === 0) { showToast('No entries yet'); return; }
  const last = rows[rows.length-1];
  const totLen = rows.reduce((s,r)=>s+r.len,0);
  const avgW = totLen > 0 ? last.cum/totLen : 0;
  document.getElementById('m-title').textContent = 'End Session?';
  document.getElementById('m-sub').textContent = 'Saves to Google Sheets then resets for a new session.';
  document.getElementById('m-ok').textContent = 'Save & End Session';
  document.getElementById('m-ok').onclick = endSession;
  document.getElementById('m-n').textContent = rows.length;
  document.getElementById('m-rng').textContent = sess.startSt + ' → ' + last.station;
  document.getElementById('m-len').textContent = totLen.toFixed(0) + ' m';
  document.getElementById('m-avw').textContent = avgW.toFixed(2) + ' m';
  document.getElementById('m-ar').textContent = last.cum.toFixed(2) + ' m²';
  document.getElementById('modal').classList.add('on');
}
function closeModal() { document.getElementById('modal').classList.remove('on'); }

async function endSession() {
  closeModal();
  const ok = await sync();
  if (!ok) {
    // Sync failed — keep session, show retry
    document.getElementById('m-title').textContent = 'Sync Failed';
    document.getElementById('m-sub').textContent = 'No connection. Your data is safe. Check signal and try again.';
    document.getElementById('m-ok').textContent = 'Retry';
    document.getElementById('m-ok').onclick = endSession;
    document.getElementById('modal').classList.add('on');
    return;
  }
  // Confirmed — reset
  sess = null; rows = [];
  persist();
  document.getElementById('pg-track').classList.remove('on');
  document.getElementById('pg-setup').classList.add('on');
  showToast('Session saved ✓');
}

// ── SYNC ──────────────────────────────────────────────────────────────────
async function sync() {
  if (!sess || rows.length === 0) { showToast('Nothing to sync'); return false; }
  const btn = document.getElementById('synbtn');
  btn.innerHTML = '<span class="spinning">↻</span>';
  btn.className = 'synbtn';

  const last = rows[rows.length-1];
  const totLen = rows.reduce((s,r)=>s+r.len,0);
  const avgW = totLen > 0 ? last.cum/totLen : 0;

  const payload = {
    action: 'save_session',
    tabName: sess.tab,
    entries: rows.map(r => ({
      station: r.station, width: r.width,
      length: r.len, segArea: r.seg, cumArea: r.cum,
      timestamp: r.ts
    })),
    summary: {
      date: sess.date, direction: sess.dir, activity: 'Milling',
      startStation: sess.startSt, endStation: last.station,
      totalLength: totLen.toFixed(1), avgWidth: avgW.toFixed(2),
      totalArea: last.cum.toFixed(2)
    }
  };

  try {
    const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
    const res = await fetch(url);
    const json = await res.json();
    if (json.ok) {
      btn.textContent = '✓'; btn.className = 'synbtn ok';
      showToast('Synced to Sheets ✓');
      setTimeout(() => { btn.textContent = '☁'; btn.className = 'synbtn'; }, 3000);
      return true;
    }
    throw new Error(json.error || 'Script error');
  } catch(e) {
    btn.textContent = '✕'; btn.className = 'synbtn err';
    showToast('Sync failed — data safe on device');
    setTimeout(() => { btn.textContent = '☁'; btn.className = 'synbtn'; }, 4000);
    return false;
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Default date
const _d = new Date();
const _m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('s-dt').value =
  _d.getDate() + ' ' + _m[_d.getMonth()] + ' ' + String(_d.getFullYear()).slice(2);

// Restore session if one was in progress
restore();
if (sess && sess.startSt) {
  dir = sess.dir || 'NB';
  goTracker();
} else {
  sess = null; rows = [];
}
</script>
</body>
</html>
