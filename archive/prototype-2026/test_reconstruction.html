function jsonpCall(url) {
  return new Promise((resolve) => {
    const cb = 'rc_cb_' + Date.now();
    const timer = setTimeout(() => {
      cleanup(); resolve({ok:false,error:'timeout after 60s'});
    }, 60000);
    window[cb] = r => { cleanup(); resolve(r||{ok:false,error:'empty'}); };
    function cleanup() {
      clearTimeout(timer); delete window[cb];
      const el=document.getElementById('_rcjsc'); if(el) el.remove();
    }
    const s = document.createElement('script');
    s.id = '_rcjsc';
    s.onerror = () => { cleanup(); resolve({ok:false,error:'script load failed'}); };
    s.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    document.head.appendChild(s);
  });
}

async function runTest() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Running… (may take 30-60 seconds for AI reconstruction)';
  status.innerHTML = '<span style="color:#F59E0B">⏳ Sending to reconstruction script…</span>';

  const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
  const result = await jsonpCall(url);

  if (result.ok) {
    status.innerHTML = `
      <span class="ok">✓ Reconstruction complete!</span><br><br>
      Tab created: <strong>${result.tabName}</strong><br>
      Total area: <strong>${result.totalArea} m²</strong><br>
      Total tonnage: <strong>${result.totalTonnage} t</strong><br>
      Blended rate: <strong>${result.blendedRate} kg/m² = ${result.blendedRatePct}%</strong><br>
      Rows written: <strong>${result.rows}</strong><br><br>
      <span style="color:#888">Check the Toplift 50mm Application Rate Sheet — tab "27Jun26-NB" should now be populated.</span>
    `;
  } else {
    status.innerHTML = `<span class="err">✗ Error: ${result.error}</span><pre>${JSON.stringify(result,null,2)}</pre>`;
  }
  btn.disabled = false;
  btn.textContent = 'Run Again';
}
